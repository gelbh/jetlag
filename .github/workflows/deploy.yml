name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx wrangler deploy --dry-run

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      functions_deployed: ${{ steps.deploy_meta.outputs.functions_deployed }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: changes
        with:
          filters: |
            backend:
              - 'functions/**'
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'storage.rules'
              - 'firebase.json'
              - 'scripts/deploy-production.mjs'
              - '.firebaserc'
              - 'src/services/billing/**'
              - 'src/routes/Premium.tsx'
              - 'src/services/admin/**'
              - 'src/hooks/admin/**'
              - 'src/routes/AdminPanel.tsx'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changes.outputs.backend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.backend == 'true'
      - name: Install Doppler CLI
        if: steps.changes.outputs.backend == 'true'
        uses: DopplerHQ/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          verify-doppler-config: false
      - name: Load Doppler secrets
        if: steps.changes.outputs.backend == 'true'
        run: doppler secrets download --no-file --format docker >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        if: steps.changes.outputs.backend == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        if: steps.changes.outputs.backend == 'true'
      - name: Deploy Firestore and Functions
        id: deploy
        if: steps.changes.outputs.backend == 'true'
        run: doppler run --config prd -- npm run deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Normalize functions_deployed output
        id: deploy_meta
        if: always()
        env:
          FUNCTIONS_DEPLOYED: ${{ steps.deploy.outputs.functions_deployed }}
        run: echo "functions_deployed=${FUNCTIONS_DEPLOYED:-false}" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'worker/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'wrangler.toml'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'tailwind.css'
              - 'eslint.config.js'
            functions:
              - 'functions/**'
      - name: Decide frontend deploy
        id: changes
        env:
          BACKEND_FUNCTIONS_DEPLOYED: ${{ needs.deploy-backend.outputs.functions_deployed }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
        run: |
          if [[ "$BACKEND_FUNCTIONS_DEPLOYED" == "true" || "$FRONTEND_CHANGED" == "true" ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.frontend == 'true'
      - name: Install Doppler CLI
        if: steps.changes.outputs.frontend == 'true'
        uses: DopplerHQ/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          verify-doppler-config: false
      - name: Load Doppler secrets
        if: steps.changes.outputs.frontend == 'true'
        run: doppler secrets download --no-file --format docker >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Set CI-only env
        if: steps.changes.outputs.frontend == 'true'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: echo "VITE_SENTRY_RELEASE_DIST=$COMMIT_SHA" >> "$GITHUB_ENV"
      - name: Require functions deploy when callables changed
        if: steps.changes.outputs.frontend == 'true'
        env:
          FUNCTIONS_CHANGED: ${{ steps.filter.outputs.functions }}
          BACKEND_FUNCTIONS_DEPLOYED: ${{ needs.deploy-backend.outputs.functions_deployed }}
        run: |
          if [[ "$FUNCTIONS_CHANGED" == "true" ]]; then
            if [[ "$BACKEND_FUNCTIONS_DEPLOYED" != "true" ]]; then
              echo "::error::Push includes functions/ changes but Cloud Functions were not deployed. Deploy backend first."
              exit 1
            fi
          fi
      - name: Require App Check site key
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if [ -z "${VITE_FIREBASE_APP_CHECK_SITE_KEY}" ]; then
            echo "::error::VITE_FIREBASE_APP_CHECK_SITE_KEY is required for production builds."
            exit 1
          fi
      - name: Build production bundle
        if: steps.changes.outputs.frontend == 'true'
        run: doppler run --config prd -- npm run build 2>&1 | tee build.log
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Verify source maps are not shipped
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Source map files remain in dist after build."
            exit 1
          fi
          if [ -f dist/_redirects ]; then
            echo "::error::dist/_redirects conflicts with wrangler.toml SPA handling. Remove public/_redirects."
            exit 1
          fi
          if ! grep -qiE 'uploaded|source maps' build.log; then
            echo "::warning::Sentry source map upload was not confirmed in build output."
          fi
      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        if: steps.changes.outputs.frontend == 'true'
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
