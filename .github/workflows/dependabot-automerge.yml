name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number || github.ref }}
  # Do not cancel: job only enables auto-merge; cancel mid-gh can race with synchronize.
  cancel-in-progress: false

# GITHUB_TOKEN stays read-only; merge writes use DEPENDABOT_AUTOMERGE_TOKEN.
permissions:
  contents: read
  pull-requests: read

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      # Enables squash auto-merge only; GitHub still waits on main ruleset required checks
      # before merging. Use a Dependabot secret (not GITHUB_TOKEN) so the eventual merge
      # can trigger push workflows (Deploy).
      - name: Enable squash auto-merge for npm patch/minor
        if: >-
          steps.metadata.outputs.package-ecosystem == 'npm' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: gh pr merge --auto --squash --match-head-commit "$HEAD_SHA" "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
