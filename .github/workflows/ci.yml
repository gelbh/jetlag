name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:css
      - run: npm run typecheck
      - run: npm run release:check
      - run: npm run test:coverage
      - uses: dorny/paths-filter@v3
        id: geometry
        with:
          filters: |
            geometry:
              - 'src/domain/geometry/**'
              - 'src/hooks/map/useCombinedEliminationMask.ts'
      - name: Geometry perf gates
        if: github.event_name == 'push' || steps.geometry.outputs.geometry == 'true'
        run: npm run test:perf
      - run: npm run test:functions

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx wrangler deploy --dry-run

  emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npm run test:emulator

  e2e-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e:smoke"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report

  e2e-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-full
          path: playwright-report

  lighthouse:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:lighthouse
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci
