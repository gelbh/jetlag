name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run release:check
      - run: npm run test:coverage
      - run: npm run test:functions

  emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:emulator

  e2e-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e:smoke"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report

  e2e-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-full
          path: playwright-report

  deploy-backend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit, emulator, e2e-full]
    permissions:
      contents: read
      id-token: write
    outputs:
      functions_deployed: ${{ steps.deploy.outputs.functions_deployed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect backend changes
        id: changes
        run: |
          if [[ "${{ github.event.before }}" == 0000000* ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed" | grep -qE '^(functions/|firestore\.(rules|indexes\.json)|storage\.rules|firebase\.json|scripts/(deploy-production|sync-proxy-secrets)\.mjs|\.firebaserc)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.backend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.backend == 'true'
      - uses: google-github-actions/auth@v2
        if: steps.changes.outputs.backend == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        if: steps.changes.outputs.backend == 'true'
      - name: Deploy Firestore and Functions
        id: deploy
        if: steps.changes.outputs.backend == 'true'
        run: npm run deploy
        env:
          # Optional: fine-grained or classic PAT with repo secrets write (GH_PAT).
          GH_PAT: ${{ secrets.GH_PAT }}

  deploy-frontend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit, emulator, e2e-full, deploy-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect frontend changes
        id: changes
        run: |
          if [[ "${{ github.event.before }}" == 0000000* ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ needs.deploy-backend.outputs.functions_deployed }}" == "true" ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed" | grep -qE '^(src/|public/|index\.html|vite\.config\.ts|package(-lock)?\.json|tsconfig.*\.json|tailwind\.css|eslint\.config)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.frontend == 'true'
      - name: Require App Check site key
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_APP_CHECK_SITE_KEY }}" ]; then
            echo "::error::VITE_FIREBASE_APP_CHECK_SITE_KEY is required for production builds."
            exit 1
          fi
      - name: Build production bundle
        if: steps.changes.outputs.frontend == 'true'
        run: npm run build 2>&1 | tee build.log
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APP_CHECK_SITE_KEY }}
          VITE_OVERPASS_PROXY_URL: ${{ secrets.VITE_OVERPASS_PROXY_URL }}
          VITE_TRANSIT_PROXY_URL: ${{ secrets.VITE_TRANSIT_PROXY_URL }}
          VITE_TRANSITLAND_PROXY_URL: ${{ secrets.VITE_TRANSITLAND_PROXY_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE_DIST: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Verify source maps are not shipped
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Source map files remain in dist after build."
            exit 1
          fi
          if ! grep -qiE 'uploaded|source maps' build.log; then
            echo "::warning::Sentry source map upload was not confirmed in build output."
          fi
      - uses: cloudflare/wrangler-action@v3
        if: steps.changes.outputs.frontend == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jetlag --branch=main
