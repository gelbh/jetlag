name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run release:check
      - run: npm run test:coverage
      - run: npm run test:functions

  emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npm run test:emulator

  e2e-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e:smoke"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report

  e2e-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json', 'package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npx firebase emulators:exec --project demo-jetlag --only auth,firestore,storage "npm run test:e2e"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-full
          path: playwright-report

  deploy-backend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit, emulator, e2e-full]
    permissions:
      contents: read
      id-token: write
    outputs:
      functions_deployed: ${{ steps.deploy.outputs.functions_deployed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect backend changes
        id: changes
        run: |
          if [[ "${{ github.event.before }}" == 0000000* ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed" | grep -qE '^(functions/|firestore\.(rules|indexes\.json)|storage\.rules|firebase\.json|scripts/deploy-production\.mjs|\.firebaserc|src/services/billing/|src/routes/Premium\.tsx)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.backend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.backend == 'true'
      - name: Install Doppler CLI
        if: steps.changes.outputs.backend == 'true'
        uses: DopplerHQ/cli-action@v3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          verify-doppler-config: false
      - name: Load Doppler secrets
        if: steps.changes.outputs.backend == 'true'
        run: doppler secrets download --no-file --format docker >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - uses: google-github-actions/auth@v2
        if: steps.changes.outputs.backend == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        if: steps.changes.outputs.backend == 'true'
      - name: Deploy Firestore and Functions
        id: deploy
        if: steps.changes.outputs.backend == 'true'
        run: doppler run --config prd -- npm run deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  deploy-frontend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [unit, emulator, e2e-full, deploy-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect frontend changes
        id: changes
        run: |
          if [[ "${{ github.event.before }}" == 0000000* ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ needs.deploy-backend.outputs.functions_deployed }}" == "true" ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed" | grep -qE '^(src/|public/|index\.html|vite\.config\.ts|package(-lock)?\.json|tsconfig.*\.json|tailwind\.css|eslint\.config)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.frontend == 'true'
      - name: Install Doppler CLI
        if: steps.changes.outputs.frontend == 'true'
        uses: DopplerHQ/cli-action@v3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          verify-doppler-config: false
      - name: Load Doppler secrets
        if: steps.changes.outputs.frontend == 'true'
        run: doppler secrets download --no-file --format docker >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Set CI-only env
        if: steps.changes.outputs.frontend == 'true'
        run: echo "VITE_SENTRY_RELEASE_DIST=${{ github.sha }}" >> "$GITHUB_ENV"
      - name: Require functions deploy when callables changed
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if [[ "${{ github.event.before }}" == 0000000* ]]; then
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed" | grep -qE '^functions/'; then
            if [[ "${{ needs.deploy-backend.outputs.functions_deployed }}" != "true" ]]; then
              echo "::error::Push includes functions/ changes but Cloud Functions were not deployed. Deploy backend first."
              exit 1
            fi
          fi
      - name: Require App Check site key
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if [ -z "${VITE_FIREBASE_APP_CHECK_SITE_KEY}" ]; then
            echo "::error::VITE_FIREBASE_APP_CHECK_SITE_KEY is required for production builds."
            exit 1
          fi
      - name: Build production bundle
        if: steps.changes.outputs.frontend == 'true'
        run: doppler run --config prd -- npm run build 2>&1 | tee build.log
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Verify source maps are not shipped
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Source map files remain in dist after build."
            exit 1
          fi
          if ! grep -qiE 'uploaded|source maps' build.log; then
            echo "::warning::Sentry source map upload was not confirmed in build output."
          fi
      - uses: cloudflare/wrangler-action@v3
        if: steps.changes.outputs.frontend == 'true'
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jetlag --branch=main
