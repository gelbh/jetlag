name: Bug report
description: Something broken or wrong in the app
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    value: |
      Search [existing bug reports](https://github.com/gelbh/jetlag/issues?q=is%3Aissue+label%3Abug) first. Comment on a match instead of opening a duplicate.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setup / create session
        - Map / tools
        - Matching
        - Measuring
        - Thermometer
        - Radar
        - Tentacles
        - Photo uploads
        - Hider / hiding zone
        - Sync / multiplayer
        - Timer
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the bug appeared?
      placeholder: |
        1. Create a small game with ...
        2. Open Matching and ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Home screen version pill (e.g. 0.1.6)
    validations:
      required: false

  - type: dropdown
    id: device
    attributes:
      label: Device / browser
      options:
        - iPhone (Safari)
        - Android (Chrome)
        - Android app
        - iOS app
        - Desktop Chrome
        - Desktop Firefox
        - Desktop Safari
        - Other
    validations:
      required: true

  - type: input
    id: session_code
    attributes:
      label: Session code (optional)
      description: 4-letter code if this happened in a live game

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, screen recording links, etc.
