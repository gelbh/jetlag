"$schema" = "node_modules/wrangler/config-schema.json"
name = "jetlag"
compatibility_date = "2026-07-12"
main = "worker/index.ts"
workers_dev = false

# Zone route until Custom Domain cutover (delete stale CNAME, then swap to custom_domain = true).
[[routes]]
pattern = "jetlag.gelbhart.dev/*"
zone_name = "gelbhart.dev"

[observability]
enabled = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/assets/*"]
