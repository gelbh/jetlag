"$schema" = "node_modules/wrangler/config-schema.json"
name = "jetlag"
compatibility_date = "2026-07-12"
main = "worker/index.ts"
workers_dev = false

[[routes]]
pattern = "jetlag.gelbhart.dev"
custom_domain = true

[observability]
enabled = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true
